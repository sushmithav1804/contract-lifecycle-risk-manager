spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tool71}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:587}

jwt:
  secret: ${JWT_SECRET:your_super_secret_development_key_change_in_production}

server:
  port: 8080