spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tool71}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  # This must be indented exactly like 'datasource' and 'jpa'
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:your_super_secret_development_key_change_in_production}

server:
  port: 8080